<!DOCTYPE html>
<!--
  ዐዲስ ፡ ያማርኛ ፡ መዝገበ ፡ ቃላት -- New Amharic Dictionary
  (Desta Tekle Wold, 1970)
  ------------------------------------------------------------------
  DATA SHAPE (amharic_dictionary.json): a read-only, pre-cleaned array
  of two-field objects, already merged into book order by the export
  step described in the project spec:
    { "word": "...", "definition": "..." }

  This file NEVER reorders, rewrites, or regenerates that array. It is
  treated strictly as the final exported dataset:
    - Letter-filtering and search both use Array.filter, which
      preserves the JSON's original relative order.
    - Search ranks matches into tiers with a STABLE sort, so within
      any one tier, entries keep their original book order.

  MATCHING LOGIC (see cleanText() below): dictionary word cells contain
  Amharic letters mixed with punctuation/separators (፡ ፣ ። ፤, brackets,
  stray marks from the original typed encoding). All matching, ranking,
  and alphabet-grouping is done against a punctuation-stripped version
  of each word (computed ONCE per entry at load time), while the
  ORIGINAL word text is always what gets displayed on screen.

  NO OFFLINE FUNCTIONALITY: no manifest, no service worker, no caching.
  This is an ordinary web page.

  HOSTING NOTES (GitHub Pages):
  1. This file as index.html, amharic_dictionary.json beside it.
  2. Enable Pages in repo Settings.
  3. Don't open via file:// -- fetch() needs http(s). Test with:
     python3 -m http.server
-->
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ዐዲስ ፡ ያማርኛ ፡ መዝገበ ፡ ቃላት</title>
<meta name="description" content="በካህናትና ፡ በሀገረ ፡ ሰብ ፡ ቋንቋ ፡ ተፃፈ ፡ ከደስታ ፡ ተክለ ፡ ወልድ">
<link rel="preload" as="fetch" href="amharic_dictionary.json" crossorigin="anonymous">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;700&family=Noto+Sans+Ethiopic:wght@400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --vellum:        #f2e6c4;
    --vellum-deep:   #e9d8ab;
    --ink:           #2a1f14;
    --ink-soft:      #5c4c38;
    --rubric:        #9c2b1f;
    --rubric-soft:   #f4dcd6;
    --gold:          #97701c;
    --gold-line:     rgba(151,112,28,0.35);
    --card-bg:       #fbf6e7;
    --card-border:   rgba(42,31,20,0.12);
    --shadow:        rgba(42,31,20,0.15);
    --star:          #b8860b;
    --content-scale: 1;

    --font-display:  'Noto Serif Ethiopic', serif;
    --font-body:     'Noto Sans Ethiopic', sans-serif;
    --font-ui:       'Inter', system-ui, sans-serif;
  }

  html[data-theme="ink"]{
    --vellum:        #1b1712;
    --vellum-deep:   #14110d;
    --ink:           #ecdfc4;
    --ink-soft:      #b8a888;
    --rubric:        #e2695a;
    --rubric-soft:   #3a2320;
    --gold:          #d3ab52;
    --gold-line:     rgba(211,171,82,0.3);
    --card-bg:       #242019;
    --card-border:   rgba(211,171,82,0.15);
    --shadow:        rgba(0,0,0,0.5);
    --star:          #e2c168;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--vellum);
    background-image:
      radial-gradient(circle at 15% 8%, var(--vellum-deep) 0%, transparent 45%),
      radial-gradient(circle at 85% 92%, var(--vellum-deep) 0%, transparent 40%);
    color: var(--ink);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  .border-strip{
    height: 8px;
    width: 100%;
    background-image: repeating-linear-gradient(
      45deg, var(--gold) 0px, var(--gold) 3px, transparent 3px, transparent 10px);
    opacity: .55;
  }

  .app{ width: 100%; max-width: 620px; margin: 0 auto; padding: 28px 18px 60px; }

  header{ text-align: center; margin-bottom: 22px; }
  .mark{ font-size: 1.6rem; color: var(--gold); line-height: 1; margin-bottom: 6px; }
  header h1{
    font-family: var(--font-display); font-weight: 700; font-size: 1.85rem;
    margin: 0 0 6px 0; color: var(--ink); letter-spacing: 0.3px; line-height: 1.4;
  }
  header .subtitle{ font-family: var(--font-body); color: var(--ink-soft); margin: 0; font-size: 0.92rem; }
  .credit{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--ink);
    margin: 10px auto 0;
    max-width: 480px;
    line-height: 1.7;
    padding-top: 10px;
    border-top: 1px dashed var(--gold-line);
  }

  /* ---- control bar ---- */
  .control-bar{
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin: 16px 0 18px; flex-wrap: wrap;
  }
  .font-size-control{
    display: flex; align-items: center; gap: 6px;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 4px 6px;
  }
  .font-size-control button{
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--gold-line); background: transparent; color: var(--ink-soft);
    font-family: var(--font-ui); font-weight: 700; font-size: 0.72rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .font-size-control button:hover{ border-color: var(--gold); color: var(--gold); }
  .font-size-control button:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }
  .font-size-control button:disabled{ opacity: .35; cursor: default; }
  #fontSizeLabel{ font-family: var(--font-ui); font-size: 0.68rem; color: var(--ink-soft); min-width: 32px; text-align: center; }

  .theme-toggle, .home-btn{
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-ui); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em;
    background: transparent; border: 1px solid var(--gold-line); color: var(--ink-soft);
    border-radius: 20px; padding: 6px 14px; cursor: pointer;
  }
  .theme-toggle:hover, .home-btn:hover{ border-color: var(--gold); color: var(--gold); }
  .theme-toggle:focus-visible, .home-btn:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---- search ---- */
  .search-wrap{ position: sticky; top: 12px; z-index: 50; margin-bottom: 6px; display: flex; gap: 8px; }
  .search-field{ position: relative; flex: 1; display:flex; }

  .search-icon{
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--ink-soft); pointer-events: none; opacity: .75;
  }

  .search-box{
    flex: 1;
    padding: 15px 46px 15px 44px;
    font-size: 17px;
    font-family: var(--font-body);
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    outline: none;
    background: var(--card-bg);
    color: var(--ink);
    box-shadow: 0 8px 20px -8px var(--shadow);
    width: 100%;
  }
  .search-box::placeholder{ color: var(--ink-soft); opacity: .7; }
  .search-box:focus{ border-color: var(--gold); box-shadow: 0 8px 24px -6px var(--gold-line); }
  .search-box:disabled{ opacity: .55; }

  .clear-btn{
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: transparent; color: var(--ink-soft); font-size: 16px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
  }
  .clear-btn:hover{ background: var(--card-border); color: var(--ink); }
  .search-field.has-text .clear-btn{ display:flex; }

  .kbd-hint{
    font-family: var(--font-ui); font-size: 0.68rem; color: var(--ink-soft);
    text-align: right; margin: 6px 4px 14px; opacity: .75;
  }
  .kbd-hint kbd{ border: 1px solid var(--gold-line); border-radius: 4px; padding: 1px 5px; font-family: var(--font-ui); }

  /* ---- load progress ---- */
  .load-progress{
    height: 5px; background: var(--card-border); border-radius: 4px;
    overflow: hidden; margin: 0 0 16px;
  }
  .load-progress-bar{
    height: 100%; width: 0%; background: var(--gold); border-radius: 4px;
    transition: width .2s ease;
  }
  .load-progress-bar.indeterminate{
    width: 35%; animation: indeterminate-slide 1.1s ease-in-out infinite;
  }
  @keyframes indeterminate-slide{
    0%{ margin-left: -35%; }
    100%{ margin-left: 100%; }
  }

  /* ---- fidel navigator (33 base-consonant families, per traditional
     alphabet order; grouping is computed from the CLEANED word) ---- */
  .fidel-nav{ display: flex; gap: 7px; overflow-x: auto; padding: 4px 2px 14px; margin-bottom: 4px; scrollbar-width: thin; }
  .fidel-nav::-webkit-scrollbar{ height: 5px; }
  .fidel-nav::-webkit-scrollbar-thumb{ background: var(--gold-line); border-radius: 10px; }

  .fidel-btn{
    flex: 0 0 auto; width: 42px; height: 42px; border-radius: 10px;
    border: 1.5px solid var(--card-border); background: var(--card-bg); color: var(--ink);
    font-family: var(--font-display); font-size: 1.15rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 5px -2px var(--shadow);
  }
  .fidel-btn:hover{ border-color: var(--gold); }
  .fidel-btn.active{ background: var(--rubric); border-color: var(--rubric); color: #fdf3ea; }
  .fidel-btn:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---- favorites toggle row ---- */
  .filter-row{ display:flex; justify-content:center; gap:8px; margin-bottom: 16px; }
  .fav-toggle{
    font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600;
    border: 1.5px solid var(--gold-line); background: var(--card-bg); color: var(--ink-soft);
    border-radius: 20px; padding: 7px 16px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .fav-toggle .star{ color: var(--star); }
  .fav-toggle:hover{ border-color: var(--gold); color: var(--ink); }
  .fav-toggle.active{ background: var(--rubric); border-color: var(--rubric); color: #fdf3ea; }
  .fav-toggle.active .star{ color: #fdf3ea; }
  .fav-toggle:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---- recently viewed ---- */
  .recent-section{ margin-bottom: 14px; }
  .recent-label{
    font-family: var(--font-ui); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
    color: var(--ink-soft); margin-bottom: 6px; text-align: center;
  }
  .recent-row{ display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: thin; }
  .recent-row::-webkit-scrollbar{ height: 4px; }
  .recent-row::-webkit-scrollbar-thumb{ background: var(--gold-line); border-radius: 10px; }
  .recent-chip{
    flex: 0 0 auto; font-family: var(--font-display); font-size: 0.85rem; font-weight: 600;
    background: var(--card-bg); border: 1px solid var(--card-border); color: var(--ink);
    border-radius: 20px; padding: 6px 14px; cursor: pointer; white-space: nowrap;
  }
  .recent-chip:hover{ border-color: var(--gold); color: var(--gold); }
  .recent-chip:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---- status ---- */
  .status-row{ text-align: center; margin-bottom: 16px; }
  .status-pill{
    display: inline-block; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
    letter-spacing: 0.02em; color: var(--ink-soft); background: var(--card-border);
    padding: 5px 13px; border-radius: 20px;
  }

  /* ---- word of the day ---- */
  .wotd-card{
    background: var(--card-bg); border-radius: 18px; padding: 20px 22px; margin-bottom: 22px;
    border: 1px solid var(--gold-line); box-shadow: 0 6px 18px -8px var(--shadow);
    position: relative; overflow: hidden;
  }
  .wotd-card::before{ content:''; position: absolute; top:0; left:0; width: 5px; height: 100%; background: var(--rubric); }
  .wotd-card-top{ display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .wotd-badge{
    font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--rubric); background: var(--rubric-soft); padding: 4px 11px; border-radius: 12px;
    display: inline-block; margin-bottom: 12px;
  }
  .wotd-word{ font-family: var(--font-display); font-size: calc(1.6rem * var(--content-scale)); font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .wotd-def{ font-size: calc(1.02rem * var(--content-scale)); line-height: 1.65; color: var(--ink); border-top: 1px dashed var(--card-border); padding-top: 10px; }

  /* ---- result cards ---- */
  .results-wrapper{ display:flex; flex-direction: column; gap: 12px; }

  .word-card{
    background: var(--card-bg); padding: 18px 20px; border-radius: 16px;
    border: 1px solid var(--card-border); box-shadow: 0 4px 12px -6px var(--shadow);
  }

  .card-top{ display:flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .word-title{ font-family: var(--font-display); font-size: calc(1.35rem * var(--content-scale)); font-weight: 700; color: var(--ink); line-height: 1.3; }
  .word-title mark{ background: transparent; color: var(--rubric); font-weight: 700; }

  .card-actions{ display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }

  .copy-btn{
    background: transparent; border: none; cursor: pointer; color: var(--ink-soft);
    padding: 2px; display: flex; align-items: center;
  }
  .copy-btn:hover{ color: var(--gold); }
  .copy-btn.copied{ color: var(--rubric); }
  .copy-btn:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 4px; }

  .fav-btn{
    flex: 0 0 auto; background: transparent; border: none; cursor: pointer;
    font-size: 1.3rem; line-height: 1; color: var(--card-border); padding: 2px;
  }
  .fav-btn:hover{ transform: scale(1.1); }
  .fav-btn.is-fav{ color: var(--star); }
  .fav-btn:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 4px; }

  .word-def{
    font-size: calc(1rem * var(--content-scale)); line-height: 1.6; color: var(--ink);
    border-top: 1px dashed var(--card-border); padding-top: 10px; margin-top: 10px;
  }
  .word-def mark{ background: transparent; color: var(--rubric); font-weight: 600; }

  .word-link{
    background: none; border: none; padding: 0; margin: 0; font: inherit; display: inline;
    color: var(--gold); cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px;
  }
  .word-link:hover{ color: var(--rubric); text-decoration-style: solid; }
  .word-link:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 2px; }

  /* ---- load more / empty state ---- */
  .load-more{
    display: block; margin: 18px auto 0; font-family: var(--font-ui); font-weight: 600;
    font-size: 0.85rem; color: var(--gold); background: transparent;
    border: 1.5px solid var(--gold-line); border-radius: 30px; padding: 10px 22px;
    cursor: pointer;
  }
  .load-more:hover{ border-color: var(--gold); background: var(--gold-line); }

  .empty-state{ text-align: center; padding: 40px 20px; color: var(--ink-soft); }
  .empty-state .glyph{ font-size: 2.2rem; color: var(--gold); margin-bottom: 10px; font-family: var(--font-display); }
  .empty-state p{ font-family: var(--font-ui); font-size: 0.9rem; margin: 4px 0; }

  .hidden{ display: none !important; }

  /* ---- phone-sized screens ---- */
  @media (max-width: 480px){
    .app{ padding: 20px 14px 48px; }
    header{ margin-bottom: 18px; }
    header h1{ font-size: 1.45rem; }
    header .subtitle{ font-size: 0.82rem; }
    .theme-toggle, .home-btn{ font-size: 0.66rem; padding: 5px 10px; }
    .font-size-control button{ width: 25px; height: 25px; }
    .credit{ font-size: 0.76rem; }

    .search-box{ font-size: 16px; padding: 13px 42px 13px 40px; border-radius: 12px; }
    .search-icon{ left: 14px; width: 16px; height: 16px; }
    .clear-btn{ width: 32px; height: 32px; right: 6px; }

    .fidel-btn{ width: 40px; height: 40px; font-size: 1.05rem; }
    .fav-toggle{ font-size: 0.76rem; padding: 6px 13px; }
    .recent-chip{ font-size: 0.8rem; padding: 5px 12px; }

    .word-card{ padding: 16px 16px; border-radius: 14px; }
    .word-title{ font-size: 1.2rem; }
    .fav-btn{ font-size: 1.4rem; padding: 4px 2px; }
    .word-def{ font-size: 0.96rem; }

    .wotd-card{ padding: 18px 16px; }
    .wotd-word{ font-size: 1.4rem; }
  }

  @media (hover: none) and (pointer: coarse){
    .kbd-hint{ display: none; }
  }

  @media (max-width: 340px){
    header h1{ font-size: 1.3rem; }
    .fidel-btn{ width: 37px; height: 37px; }
  }

  @media (prefers-reduced-motion: reduce){
    .load-progress-bar.indeterminate{ animation: none; }
  }
</style>
</head>
<body>

<div class="border-strip"></div>

<div class="app">
  <header>
    <div class="mark">✚</div>
    <h1>ዐዲስ ፡ ያማርኛ ፡ መዝገበ ፡ ቃላት።</h1>
    <p class="subtitle">በካህናትና ፡ በሀገረ ፡ ሰብ ፡ ቋንቋ ፡ ተፃፈ</p>
    <p class="credit">ከደስታ ፡ ተክለ ፡ ወለድ ፡ ዘሀገረ ፡ ወግዳ።</p>
  </header>

  <div class="control-bar">
    <button class="home-btn" id="homeBtn" type="button" aria-label="መነሻ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <path d="M3 9.5 12 3l9 6.5"></path>
        <path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"></path>
      </svg>
      <span>መነሻ</span>
    </button>
    <div class="font-size-control" role="group" aria-label="የፅሁፍ መጠን">
      <button type="button" id="fontDecBtn" aria-label="ፅሁፍ አሳንስ">A−</button>
      <span id="fontSizeLabel">100%</span>
      <button type="button" id="fontIncBtn" aria-label="ፅሁፍ አግዝፍ">A+</button>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="ገፅ ገፅታ ቀይር">☀ ገፅ</button>
  </div>

  <div class="search-wrap">
    <div class="search-field" id="searchField">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" class="search-box" placeholder="መዝገበ ቃላቱ በመጫን ላይ..." autocomplete="off" disabled>
      <button class="clear-btn" id="clearBtn" aria-label="ማጽዳት">✕</button>
    </div>
  </div>
  <div class="kbd-hint">ለመፍለግ <kbd>/</kbd> ይጫኑ</div>

  <div class="load-progress" id="loadProgress"><div class="load-progress-bar" id="loadProgressBar"></div></div>

  <div class="fidel-nav" id="fidelNav" aria-label="በሆሄ ማጣራት"></div>

  <div class="filter-row">
    <button class="fav-toggle" id="favToggle" type="button">
      <span class="star">★</span> <span id="favToggleLabel">የተመረጡ ብቻ</span>
    </button>
  </div>

  <div class="recent-section hidden" id="recentSection">
    <div class="recent-label">በቅርብ የታዩ</div>
    <div class="recent-row" id="recentRow"></div>
  </div>

  <div class="status-row"><span class="status-pill" id="statusMsg">መዝገበ ቃላቱ በመጫን ላይ ነው...</span></div>

  <div id="wotdSection" class="wotd-card hidden">
    <div class="wotd-card-top">
      <div class="wotd-badge">✨ የእለቱ ቃል</div>
      <button class="copy-btn" id="wotdCopyBtn" aria-label="ቅዳ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <rect x="9" y="9" width="13" height="13" rx="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>
    </div>
    <div class="wotd-word" id="wotdWord">...</div>
    <div class="wotd-def" id="wotdDefinition">...</div>
  </div>

  <div class="results-wrapper" id="resultsList"></div>
  <button class="load-more hidden" id="loadMoreBtn">ተጨማሪ አሳይ</button>
</div>

<script>
(function(){
  /* =================================================================
     DATA STATE
     dictionaryData holds the JSON exactly as loaded, in its original
     order, plus two precomputed fields per entry:
       cleanWord -- word with all punctuation/separators/non-Ethiopic
                    characters stripped (used for ALL matching/ranking)
       _idx      -- stable original-array index (used as an entry id)
     Nothing here ever reorders dictionaryData itself.
  ================================================================= */
  let dictionaryData = [];
  let itemByIdx = new Map();     // O(1) id -> entry lookup (avoids Array.find on 59k rows)
  let wordIndex = new Map();     // cleanWord -> _idx, for definition cross-linking
  let currentFiltered = null;
  let renderCount = 0;
  const PAGE_SIZE = 25;

  const favorites = new Set();   // in-memory only (see note near the bottom)
  let showFavoritesOnly = false;
  let activeFamily = null;
  let currentWotd = null;
  const recentlyViewed = [];     // most-recent-first array of _idx, in-memory

  const searchInput   = document.getElementById('searchInput');
  const searchField    = document.getElementById('searchField');
  const clearBtn        = document.getElementById('clearBtn');
  const resultsList      = document.getElementById('resultsList');
  const statusMsg         = document.getElementById('statusMsg');
  const wotdSection         = document.getElementById('wotdSection');
  const fidelNav              = document.getElementById('fidelNav');
  const loadMoreBtn            = document.getElementById('loadMoreBtn');
  const themeToggle             = document.getElementById('themeToggle');
  const homeBtn                  = document.getElementById('homeBtn');
  const favToggle                 = document.getElementById('favToggle');
  const favToggleLabel             = document.getElementById('favToggleLabel');
  const recentSection               = document.getElementById('recentSection');
  const recentRow                    = document.getElementById('recentRow');
  const fontDecBtn                    = document.getElementById('fontDecBtn');
  const fontIncBtn                     = document.getElementById('fontIncBtn');
  const fontSizeLabel                   = document.getElementById('fontSizeLabel');
  const wotdCopyBtn                      = document.getElementById('wotdCopyBtn');
  const loadProgress                      = document.getElementById('loadProgress');
  const loadProgressBar                    = document.getElementById('loadProgressBar');

  /* =================================================================
     TEXT CLEANING -- the fix for consistent alphabet/search behavior
     Keeps ONLY Ethiopic letters (main block + the extension blocks
     used for less common characters). Strips spaces, ፡ ፣ ። ፤ ፥ ፦ ፨,
     brackets, digits, Latin punctuation -- anything that isn't an
     actual letter. This is computed ONCE per entry at load time and
     reused everywhere, so a stray leading bracket or mark on one
     entry (e.g. a raw cell like "(አክሽ") can no longer throw off
     which letter/family that entry is grouped under.
  ================================================================= */
  const ETHIOPIC_LETTER_RE = /[\u1200-\u137F\u1380-\u139F\u2D80-\u2DDF\uAB00-\uAB2F]/g;
  function cleanText(text){
    if(!text) return '';
    const m = text.match(ETHIOPIC_LETTER_RE);
    return m ? m.join('') : '';
  }

  /* ---------------- THEME ---------------- */
  function applyTheme(theme){
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'ink' ? '● ቀለም' : '☀ ገፅ';
  }
  themeToggle.addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'ink' ? 'light' : 'ink';
    applyTheme(next);
  });
  applyTheme('light');

  /* ---------------- TEXT SIZE ---------------- */
  const FONT_STEPS = [0.85, 1, 1.15, 1.3, 1.45];
  let fontStepIndex = 1;

  function applyFontStep(){
    const scale = FONT_STEPS[fontStepIndex];
    document.documentElement.style.setProperty('--content-scale', scale);
    fontSizeLabel.textContent = Math.round(scale * 100) + '%';
    fontDecBtn.disabled = fontStepIndex === 0;
    fontIncBtn.disabled = fontStepIndex === FONT_STEPS.length - 1;
  }
  fontDecBtn.addEventListener('click', () => { fontStepIndex = Math.max(0, fontStepIndex - 1); applyFontStep(); });
  fontIncBtn.addEventListener('click', () => { fontStepIndex = Math.min(FONT_STEPS.length - 1, fontStepIndex + 1); applyFontStep(); });
  applyFontStep();

  /* ---------------- IN-APP HISTORY (Home / Back button) ---------------- */
  let lastPushedStateKey = '';

  function getStateSnapshot(){
    return { query: searchInput.value, family: activeFamily, favOnly: showFavoritesOnly };
  }
  function pushAppState(){
    const state = getStateSnapshot();
    const key = JSON.stringify(state);
    if(key === lastPushedStateKey) return;
    lastPushedStateKey = key;
    history.pushState(state, '', location.href);
  }
  function applyStateSnapshot(state){
    searchInput.value = state.query || '';
    searchField.classList.toggle('has-text', !!state.query);
    activeFamily = (state.family === undefined) ? null : state.family;
    showFavoritesOnly = !!state.favOnly;

    fidelNav.querySelectorAll('.fidel-btn').forEach(b => {
      b.classList.toggle('active', activeFamily !== null && Number(b.dataset.fam) === activeFamily);
    });
    favToggle.classList.toggle('active', showFavoritesOnly);
    favToggleLabel.textContent = showFavoritesOnly ? 'ሁሉንም አሳይ' : 'የተመረጡ ብቻ';

    lastPushedStateKey = JSON.stringify(state);
    runSearch();
  }
  window.addEventListener('popstate', (e) => {
    applyStateSnapshot(e.state || { query: '', family: null, favOnly: false });
  });
  history.replaceState(getStateSnapshot(), '', location.href);
  lastPushedStateKey = JSON.stringify(getStateSnapshot());

  function goHome(){
    activeFamily = null;
    showFavoritesOnly = false;
    favToggle.classList.remove('active');
    favToggleLabel.textContent = 'የተመረጡ ብቻ';
    fidelNav.querySelectorAll('.fidel-btn').forEach(b => b.classList.remove('active'));
    searchInput.value = '';
    searchField.classList.remove('has-text');
    runSearch();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    pushAppState();
  }
  homeBtn.addEventListener('click', goHome);

  /* ---------------- FIELD NORMALIZATION ---------------- */
  const WORD_KEYS       = ['word', 'Word', 'ቃል'];
  const DEFINITION_KEYS = ['definition', 'Definition', 'ትርጉም', 'amharic', 'Amharic'];

  function pick(obj, keys){
    for(const k of keys){
      if(obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return String(obj[k]);
    }
    return '';
  }

  function normalize(raw, idx){
    let word = pick(raw, WORD_KEYS);
    let definition = pick(raw, DEFINITION_KEYS);
    if(!word && !definition){
      const vals = Object.values(raw).map(v => (v === null || v === undefined) ? '' : String(v));
      word = vals[0] || '';
      definition = vals[1] || '';
    }
    return { word, definition, cleanWord: cleanText(word), _idx: idx };
  }

  /* ---------------- LOAD DATA (with progress, for the ~7MB file) ---------------- */
  async function loadDictionary(){
    try{
      const response = await fetch('amharic_dictionary.json');
      if(!response.ok) throw new Error('HTTP ' + response.status);

      let raw;
      if(response.body && response.body.getReader){
        raw = await fetchWithProgress(response);
      } else {
        raw = await response.json();
      }

      dictionaryData = raw.map((item, i) => normalize(item, i));
      itemByIdx = new Map(dictionaryData.map(it => [it._idx, it]));
      loadProgress.classList.add('hidden');

      statusMsg.textContent = `${dictionaryData.length.toLocaleString()} ቃላት ተጭነዋል`;
      searchInput.disabled = false;
      searchInput.placeholder = 'ቃል ወይም ትርጉም ይፈልጉ...';

      buildFidelNav();
      buildWordIndex();
      generateWordOfTheDay();
    } catch(err){
      loadProgress.classList.add('hidden');
      statusMsg.textContent = "ስህተት፡ 'amharic_dictionary.json' አልተገኘም";
      console.error(err);
    }
  }

  async function fetchWithProgress(response){
    // GitHub Pages gzip-compresses .json in transit; Content-Length then
    // reports the COMPRESSED size, not the size of the decompressed bytes
    // we actually receive. Trusting it would make the bar hit "100%" long
    // before the stream finishes. If compressed, fall back to an
    // indeterminate/MB-counter display instead of a false percentage.
    const encoding = response.headers.get('content-encoding');
    const isCompressed = !!encoding && encoding !== 'identity';
    const totalStr = response.headers.get('content-length');
    const total = (!isCompressed && totalStr) ? Number(totalStr) : 0;
    const reader = response.body.getReader();
    const chunks = [];
    let loaded = 0;

    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      chunks.push(value);
      loaded += value.length;

      if(total > 0){
        const pct = Math.min(100, Math.round((loaded / total) * 100));
        loadProgressBar.style.width = pct + '%';
        statusMsg.textContent = `ቃላት በመጫን ላይ... ${pct}%`;
      } else {
        loadProgressBar.classList.add('indeterminate');
        statusMsg.textContent = `ቃላት በመጫን ላይ... ${(loaded / 1024 / 1024).toFixed(1)}MB`;
      }
    }

    const text = await new Blob(chunks).text();
    return JSON.parse(text);
  }

  /* ---------------- WORD OF THE DAY ---------------- */
  function generateWordOfTheDay(){
    if(!dictionaryData.length) return;
    const today = new Date();
    const seed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();
    const word = dictionaryData[seed % dictionaryData.length];
    currentWotd = word;

    document.getElementById('wotdWord').textContent = word.word;
    document.getElementById('wotdDefinition').innerHTML = renderRich(word.definition, '', word._idx);
    wotdSection.classList.remove('hidden');
  }

  /* =================================================================
     FIDEL NAVIGATOR -- 33-ish base-consonant "family" buttons, in the
     traditional Ethiopic alphabet order.

     THE FIX: family is computed from cleanWord's first character, not
     the raw word's first character. Previously, an entry whose raw
     text happened to start with stray punctuation (a bracket, a
     leading mark from the original typed encoding) would have its
     grouping computed from THAT character instead of the real first
     letter -- which is exactly why ሀ worked (clean entries) while
     other letters like አ, with messier surrounding punctuation in the
     source material, did not. Stripping first makes every entry's
     grouping consistent.

     Each button represents one base-consonant family (all 7 vowel
     forms, e.g. ለ ሉ ሊ ላ ሌ ል ሎ). Filtering uses Array.filter, which
     preserves the JSON's original order -- nothing here re-sorts.
  ================================================================= */
  function buildFidelNav(){
    const families = new Map(); // familyIndex -> representative base codepoint
    dictionaryData.forEach(item => {
      const w = item.cleanWord;
      if(!w) return;
      const code = w.codePointAt(0);
      if(code < 0x1200 || code > 0x137F) return; // main Ethiopic block only
      const fam = Math.floor((code - 0x1200) / 8);
      if(!families.has(fam)) families.set(fam, 0x1200 + fam*8);
    });

    const sorted = Array.from(families.entries()).sort((a,b) => a[0]-b[0]);
    fidelNav.innerHTML = '';
    sorted.forEach(([fam, baseCode]) => {
      const btn = document.createElement('button');
      btn.className = 'fidel-btn';
      btn.type = 'button';
      btn.dataset.fam = fam;
      btn.textContent = String.fromCodePoint(baseCode);
      btn.setAttribute('aria-label', 'በ' + String.fromCodePoint(baseCode) + ' ማጣራት');
      fidelNav.appendChild(btn);
    });
  }

  function familyOf(cleanWord){
    if(!cleanWord) return null;
    const code = cleanWord.codePointAt(0);
    if(code < 0x1200 || code > 0x137F) return null;
    return Math.floor((code - 0x1200) / 8);
  }

  fidelNav.addEventListener('click', (e) => {
    const btn = e.target.closest('.fidel-btn');
    if(!btn) return;
    const fam = Number(btn.dataset.fam);
    const wasActive = activeFamily === fam;
    fidelNav.querySelectorAll('.fidel-btn').forEach(b => b.classList.remove('active'));
    activeFamily = wasActive ? null : fam;
    if(!wasActive) btn.classList.add('active');
    runSearch();
    pushAppState();
  });

  /* ---------------- FAVORITES ---------------- */
  favToggle.addEventListener('click', () => {
    showFavoritesOnly = !showFavoritesOnly;
    favToggle.classList.toggle('active', showFavoritesOnly);
    favToggleLabel.textContent = showFavoritesOnly ? 'ሁሉንም አሳይ' : 'የተመረጡ ብቻ';
    runSearch();
    pushAppState();
  });

  function toggleFavorite(idx, btnEl){
    if(favorites.has(idx)){
      favorites.delete(idx);
      btnEl.classList.remove('is-fav');
      btnEl.textContent = '☆';
    } else {
      favorites.add(idx);
      btnEl.classList.add('is-fav');
      btnEl.textContent = '★';
    }
    if(showFavoritesOnly) runSearch();
  }

  /* ---------------- COPY TO CLIPBOARD ---------------- */
  function copyEntry(item, btnEl){
    const text = item.word + (item.definition ? '\n' + item.definition : '');
    const onDone = () => {
      btnEl.classList.add('copied');
      btnEl.setAttribute('aria-label', 'ተቀድቷል');
      setTimeout(() => {
        btnEl.classList.remove('copied');
        btnEl.setAttribute('aria-label', 'ቅዳ');
      }, 1400);
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(onDone).catch(() => fallbackCopy(text, onDone));
    } else {
      fallbackCopy(text, onDone);
    }
  }
  function fallbackCopy(text, cb){
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      cb();
    } catch(err){ console.error('Copy failed', err); }
  }
  wotdCopyBtn.addEventListener('click', () => { if(currentWotd) copyEntry(currentWotd, wotdCopyBtn); });

  /* ---------------- ESCAPE / HIGHLIGHT ---------------- */
  function escapeHtml(str){
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function highlight(text, rawQuery){
    const safe = escapeHtml(text || '');
    if(!rawQuery) return safe;
    const safeQuery = escapeHtml(rawQuery);
    return safe.split(safeQuery).join('<mark>' + safeQuery + '</mark>');
  }

  /* ---------------- CROSS-REFERENCE INDEX ----------------
     Maps cleanWord -> _idx, built once. Definitions that mention
     another headword (even amid punctuation) can link to it, matching
     on the same punctuation-insensitive basis as everything else. */
  function buildWordIndex(){
    wordIndex = new Map();
    dictionaryData.forEach(item => {
      if(item.cleanWord && !wordIndex.has(item.cleanWord)){
        wordIndex.set(item.cleanWord, item._idx);
      }
    });
  }

  const EDGE_PUNCT = /[፣።፤፥፦፨,.\!\?;:"'()\[\]«»]/;
  function splitEdgePunct(token){
    let start = 0, end = token.length;
    while(start < end && EDGE_PUNCT.test(token[start])) start++;
    while(end > start && EDGE_PUNCT.test(token[end-1])) end--;
    return { lead: token.slice(0, start), clean: token.slice(start, end), trail: token.slice(end) };
  }

  function renderRich(text, rawQuery, currentIdx){
    if(!text) return '';
    const safeQuery = rawQuery ? escapeHtml(rawQuery) : '';
    return text.split(/([\s፡]+)/).map(part => {
      if(part === '') return '';
      if(/^[\s፡]+$/.test(part)) return escapeHtml(part);

      const { lead, clean, trail } = splitEdgePunct(part);
      let inner = escapeHtml(clean);
      if(safeQuery && inner){
        inner = inner.split(safeQuery).join('<mark>' + safeQuery + '</mark>');
      }
      const lookupKey = cleanText(clean);
      const linkIdx = lookupKey ? wordIndex.get(lookupKey) : undefined;
      if(linkIdx !== undefined && linkIdx !== currentIdx){
        inner = `<button type="button" class="word-link" data-idx="${linkIdx}">${inner}</button>`;
      }
      return escapeHtml(lead) + inner + escapeHtml(trail);
    }).join('');
  }

  function jumpToEntry(idx){
    const target = itemByIdx.get(idx);
    if(!target) return;

    activeFamily = null;
    showFavoritesOnly = false;
    favToggle.classList.remove('active');
    favToggleLabel.textContent = 'የተመረጡ ብቻ';
    fidelNav.querySelectorAll('.fidel-btn').forEach(b => b.classList.remove('active'));

    searchInput.value = target.word;
    searchField.classList.add('has-text');
    runSearch();
    window.scrollTo({ top: 0, behavior: 'smooth' });

    addRecentlyViewed(idx);
    pushAppState();
  }

  /* ---------------- RECENTLY VIEWED ---------------- */
  function addRecentlyViewed(idx){
    const pos = recentlyViewed.indexOf(idx);
    if(pos !== -1) recentlyViewed.splice(pos, 1);
    recentlyViewed.unshift(idx);
    if(recentlyViewed.length > 10) recentlyViewed.length = 10;
    renderRecentlyViewed();
  }
  function renderRecentlyViewed(){
    if(recentlyViewed.length === 0){
      recentSection.classList.add('hidden');
      return;
    }
    recentSection.classList.remove('hidden');
    recentRow.innerHTML = recentlyViewed.map(idx => {
      const item = itemByIdx.get(idx);
      if(!item) return '';
      return `<button type="button" class="recent-chip" data-idx="${idx}">${escapeHtml(item.word)}</button>`;
    }).join('');
  }

  /* =================================================================
     SINGLE DELEGATED CLICK HANDLER
     Covers favorite/copy buttons on cards, cross-reference links
     inside definitions, and recently-viewed chips -- one listener for
     the whole document instead of one per rendered card, which matters
     once the page is rendering thousands of cards over a session on a
     low-end phone.
  ================================================================= */
  document.addEventListener('click', (e) => {
    const favBtn = e.target.closest('.fav-btn');
    if(favBtn && favBtn.dataset.idx !== undefined){
      toggleFavorite(Number(favBtn.dataset.idx), favBtn);
      return;
    }
    const copyBtn = e.target.closest('.copy-btn');
    if(copyBtn && copyBtn.dataset.idx !== undefined){
      const item = itemByIdx.get(Number(copyBtn.dataset.idx));
      if(item) copyEntry(item, copyBtn);
      return;
    }
    const link = e.target.closest('.word-link');
    if(link){
      e.preventDefault();
      jumpToEntry(Number(link.dataset.idx));
      return;
    }
    const chip = e.target.closest('.recent-chip');
    if(chip){
      e.preventDefault();
      jumpToEntry(Number(chip.dataset.idx));
      return;
    }
  });

  /* ---------------- SEARCH INPUT ---------------- */
  let debounceTimer = null;
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchField.classList.toggle('has-text', q.length > 0);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runSearch, 130);
  });
  searchInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      clearTimeout(debounceTimer);
      runSearch();
      pushAppState();
      searchInput.blur();
    } else if(e.key === 'Escape'){
      searchInput.value = '';
      searchField.classList.remove('has-text');
      runSearch();
      pushAppState();
    }
  });
  searchInput.addEventListener('blur', () => { pushAppState(); });
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    searchField.classList.remove('has-text');
    runSearch();
    pushAppState();
    searchInput.focus();
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === '/' && document.activeElement !== searchInput){
      e.preventDefault();
      searchInput.focus();
    }
  });

  /* =================================================================
     SEARCH / FILTER / RANK

     Matching and ranking both operate on cleanWord (punctuation-
     insensitive), never on the definition field, per spec. Filtering
     uses Array.filter (order-preserving); ranking uses a STABLE sort
     over 4 tiers, so within any tier entries keep the book's original
     order rather than getting scrambled:
       0 -- cleanWord is an EXACT match to the cleaned query
       1 -- cleanWord STARTS WITH the cleaned query
       2 -- cleanWord CONTAINS the cleaned query elsewhere
     (entries that don't match the word at all are filtered out
     entirely -- the definition never affects inclusion or ranking.)
  ================================================================= */
  function matchRank(cleanWord, cleanQuery){
    if(cleanWord === cleanQuery) return 0;
    if(cleanWord.startsWith(cleanQuery)) return 1;
    return 2;
  }

  function runSearch(){
    const rawQuery = searchInput.value.trim();
    const cleanQuery = cleanText(rawQuery);
    const noFilters = cleanQuery === '' && activeFamily === null && !showFavoritesOnly;

    if(noFilters){
      currentFiltered = null;
      statusMsg.textContent = `${dictionaryData.length.toLocaleString()} ቃላት ተጭነዋል`;
      wotdSection.classList.remove('hidden');
      resultsList.innerHTML = '';
      loadMoreBtn.classList.add('hidden');
      return;
    }

    wotdSection.classList.add('hidden');

    let filtered = dictionaryData;

    if(showFavoritesOnly){
      filtered = filtered.filter(item => favorites.has(item._idx));
    }
    if(activeFamily !== null){
      filtered = filtered.filter(item => familyOf(item.cleanWord) === activeFamily);
    }
    if(cleanQuery !== ''){
      filtered = filtered.filter(item => item.cleanWord.includes(cleanQuery));
      filtered = filtered.slice().sort((a, b) =>
        matchRank(a.cleanWord, cleanQuery) - matchRank(b.cleanWord, cleanQuery)
      );
    }

    currentFiltered = { items: filtered, rawQuery };
    renderCount = 0;
    statusMsg.textContent = `${filtered.length.toLocaleString()} ቃላት ተገኝተዋል`;
    resultsList.innerHTML = '';
    renderNextPage();
  }

  function renderNextPage(){
    if(!currentFiltered) return;
    const { items, rawQuery } = currentFiltered;

    if(items.length === 0){
      const msg = showFavoritesOnly && !rawQuery && activeFamily === null
        ? ['ገ', 'ገና ምንም ቃል አልመረጡም', 'ኮከቡን ⭐ ተጭነው ቃላት ወደ ተመረጡ ጨምሩ']
        : ['ፈ', 'ምንም ቃል አልተገኘም', 'ሌላ ቃል ወይም ሆሄ ይሞክሩ'];
      resultsList.innerHTML = `
        <div class="empty-state">
          <div class="glyph">${msg[0]}</div>
          <p>${msg[1]}</p>
          <p>${msg[2]}</p>
        </div>`;
      loadMoreBtn.classList.add('hidden');
      return;
    }

    const slice = items.slice(renderCount, renderCount + PAGE_SIZE);
    const frag = document.createDocumentFragment();

    slice.forEach(item => {
      const isFav = favorites.has(item._idx);
      const card = document.createElement('div');
      card.className = 'word-card';
      card.innerHTML = `
        <div class="card-top">
          <div class="word-title">${highlight(item.word, rawQuery)}</div>
          <div class="card-actions">
            <button class="copy-btn" aria-label="ቅዳ" data-idx="${item._idx}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <button class="fav-btn ${isFav ? 'is-fav' : ''}" aria-label="ወደ ተመረጡ ጨምር" data-idx="${item._idx}">${isFav ? '★' : '☆'}</button>
          </div>
        </div>
        <div class="word-def">${renderRich(item.definition, rawQuery, item._idx)}</div>
      `;
      frag.appendChild(card);
    });

    resultsList.appendChild(frag);
    renderCount += slice.length;
    loadMoreBtn.classList.toggle('hidden', renderCount >= items.length);
  }

  loadMoreBtn.addEventListener('click', renderNextPage);

  loadDictionary();
})();
</script>

</body>
</html>
